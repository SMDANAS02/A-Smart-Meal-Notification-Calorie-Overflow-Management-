<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FitAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --red: #E8000D;
  --red-dim: #8a0008;
  --red-glow: rgba(232,0,13,0.25);
  --black: #080808;
  --card: #0e0e0e;
  --border: #1c1c1c;
  --text: #f0f0f0;
  --muted: #555;
  --input-bg: #111;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--black); font-family: 'Barlow', sans-serif; overflow: hidden; }

/* ─── LOGIN PAGE ─── */
#loginPage {
  width: 100vw;
  height: 100vh;
  position: fixed;
  top: 0; left: 0;
  z-index: 10;
  transition: opacity 0.3s ease;
}

/* Equal 50/50 split */
.page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

/* ─── LEFT PANEL ─── */
.left {
  position: relative;
  overflow: hidden;
  background: #050505;
}
.left-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 60% 40%, rgba(232,0,13,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 80% at 20% 80%, rgba(232,0,13,0.08) 0%, transparent 60%);
}
.scanlines {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events: none; z-index: 2;
}
.grid-lines {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(232,0,13,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(232,0,13,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridMove 20s linear infinite;
}
.bg-text {
  position: absolute; bottom: -40px; left: -20px;
  font-family: 'Bebas Neue', sans-serif; font-size: 28vw;
  color: transparent; -webkit-text-stroke: 1px rgba(232,0,13,0.08);
  line-height: 1; pointer-events: none; user-select: none; z-index: 1;
}
.stat-card {
  position: absolute;
  background: rgba(14,14,14,0.85); border: 1px solid var(--border);
  border-left: 3px solid var(--red); backdrop-filter: blur(12px);
  padding: 14px 20px; border-radius: 2px; z-index: 5;
  opacity: 0; animation: floatIn 0.8s ease forwards, floatBob ease-in-out infinite;
}
.stat-card:nth-child(1) { top: 18%; left: 8%;  animation-delay: 0.6s, 0.6s; animation-duration: 0.8s, 4s; }
.stat-card:nth-child(2) { top: 42%; left: 45%; animation-delay: 0.9s, 0.9s; animation-duration: 0.8s, 5s; }
.stat-card:nth-child(3) { top: 68%; left: 12%; animation-delay: 1.2s, 1.2s; animation-duration: 0.8s, 3.5s; }
.stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--red); line-height: 1; }
.stat-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; font-weight: 600; margin-top: 2px; text-transform: uppercase; }
.hero-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 4; padding: 40px; text-align: center;
}
.hero-eyebrow { font-size: 11px; letter-spacing: 6px; color: var(--red); font-weight: 700; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.6s ease 0.2s forwards; }
.hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(56px, 6vw, 90px); color: white; line-height: 0.9; letter-spacing: 4px; opacity: 0; animation: fadeUp 0.7s ease 0.35s forwards; }
.hero-title span { color: var(--red); display: block; }
.hero-sub { margin-top: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: #444; letter-spacing: 3px; font-weight: 300; opacity: 0; animation: fadeUp 0.7s ease 0.5s forwards; }
.divider-vert { position: absolute; right: 0; top: 0; bottom: 0; width: 1px; background: linear-gradient(to bottom, transparent, var(--red) 30%, var(--red) 70%, transparent); opacity: 0.3; }
.corner-accent { position: absolute; top: 0; right: 0; width: 120px; height: 120px; border-top: 3px solid var(--red); border-right: 3px solid var(--red); opacity: 0.4; z-index: 6; }
.corner-accent-bl { position: absolute; bottom: 0; left: 0; width: 80px; height: 80px; border-bottom: 2px solid var(--red); border-left: 2px solid var(--red); opacity: 0.25; z-index: 6; }
#particles { position: absolute; inset: 0; z-index: 3; pointer-events: none; }

/* ─── RIGHT PANEL ─── */
.right {
  position: relative; background: var(--card);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: center;
  padding: 48px 44px; overflow: hidden;
}
.right::after {
  content: ''; position: absolute; top: -100px; right: -100px;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, var(--red) 0%, transparent 70%);
  opacity: 0.06; pointer-events: none;
}
.top-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--red) 40%, var(--red-dim) 70%, transparent); opacity: 0.8; }
.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; opacity: 0; animation: fadeUp 0.5s ease 0.1s forwards; }
.brand-logo { width: 40px; height: 40px; background: rgba(232,0,13,0.1); border: 1px solid rgba(232,0,13,0.3); border-radius: 3px; display: flex; align-items: center; justify-content: center; position: relative; }
.brand-logo::after { content: ''; position: absolute; inset: -4px; border: 1px solid rgba(232,0,13,0.1); border-radius: 5px; }
.brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: white; letter-spacing: 5px; }
.brand-name em { color: var(--red); font-style: normal; }
.form-heading { margin-bottom: 6px; opacity: 0; animation: fadeUp 0.5s ease 0.2s forwards; }
.form-heading h2 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; letter-spacing: 3px; color: white; }
.form-heading h2 span { color: var(--red); }
.form-sub { font-size: 13px; color: var(--muted); letter-spacing: 1px; margin-top: 6px; margin-bottom: 28px; opacity: 0; animation: fadeUp 0.5s ease 0.3s forwards; }
.field { margin-bottom: 16px; opacity: 0; animation: fadeUp 0.5s ease forwards; }
.field:nth-of-type(1) { animation-delay: 0.35s; }
.field:nth-of-type(2) { animation-delay: 0.45s; }
.field-label { display: block; font-size: 9px; font-weight: 700; color: #3a3a3a; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; transition: color 0.2s; }
.field:focus-within .field-label { color: var(--red); }
.input-wrap { position: relative; display: flex; align-items: center; background: var(--input-bg); border: 1px solid #1a1a1a; border-radius: 2px; transition: border-color 0.2s, box-shadow 0.2s; overflow: hidden; }
.input-wrap::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--red); transform: scaleY(0); transition: transform 0.2s ease; transform-origin: bottom; }
.field:focus-within .input-wrap { border-color: rgba(232,0,13,0.4); box-shadow: 0 0 0 3px rgba(232,0,13,0.07); }
.field:focus-within .input-wrap::before { transform: scaleY(1); }
.input-icon { padding: 0 14px; color: #333; flex-shrink: 0; display: flex; align-items: center; transition: color 0.2s; }
.field:focus-within .input-icon { color: var(--red); }
.input-wrap input { flex: 1; height: 50px; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; }
.input-wrap input::placeholder { color: #2a2a2a; }
.toggle-pw { background: none; border: none; cursor: pointer; color: #333; padding: 0 14px; display: flex; align-items: center; transition: color 0.2s; }
.toggle-pw:hover { color: var(--red); }
.options-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; opacity: 0; animation: fadeUp 0.5s ease 0.55s forwards; }
.check-label { display: flex; align-items: center; gap: 9px; cursor: pointer; user-select: none; }
.custom-check { width: 17px; height: 17px; border: 1px solid #2a2a2a; border-radius: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: transparent; }
.custom-check.checked { background: var(--red); border-color: var(--red); box-shadow: 0 0 8px var(--red-glow); }
.check-text { font-size: 12px; color: #555; font-weight: 500; }
.forgot-link { font-size: 11px; color: var(--red); text-decoration: none; letter-spacing: 1px; font-weight: 600; opacity: 0.7; transition: opacity 0.2s; }
.forgot-link:hover { opacity: 1; }

/* ─── SUBMIT BUTTON ─── */
.submit-btn {
  position: relative; width: 100%; height: 54px;
  background: var(--red); border: none; border-radius: 2px;
  color: white; font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 5px; cursor: pointer;
  overflow: hidden; transition: transform 0.1s, box-shadow 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 18px; opacity: 0;
  animation: fadeUp 0.5s ease 0.65s forwards;
  box-shadow: 0 8px 32px rgba(232,0,13,0.25);
}
.submit-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent); transition: left 0.5s ease; }
.submit-btn:hover::before { left: 160%; }
.submit-btn:hover { box-shadow: 0 12px 40px rgba(232,0,13,0.4); transform: translateY(-1px); }
.submit-btn:active { transform: translateY(0); }

.or-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.5s ease 0.72s forwards; }
.or-line { flex: 1; height: 1px; background: #191919; }
.or-text { font-size: 10px; color: #2a2a2a; letter-spacing: 3px; font-weight: 700; }
.google-btn { width: 100%; height: 48px; background: transparent; border: 1px solid #1e1e1e; border-radius: 2px; display: flex; align-items: center; justify-content: center; gap: 12px; color: #666; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: border-color 0.2s, color 0.2s; opacity: 0; animation: fadeUp 0.5s ease 0.78s forwards; }
.google-btn:hover { border-color: #333; color: #999; }
.register-row { margin-top: 24px; text-align: center; font-size: 12px; color: #333; letter-spacing: 0.5px; opacity: 0; animation: fadeUp 0.5s ease 0.85s forwards; }
.register-row a { color: var(--red); text-decoration: none; font-weight: 700; font-size: 11px; letter-spacing: 2px; margin-left: 6px; }
.bottom-tag { position: absolute; bottom: 24px; left: 44px; font-size: 9px; color: #222; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }
.dots { display: flex; gap: 5px; align-items: center; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: white; animation: pulse 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

/* ═══════════════════════════════════════
   CENTER EXPAND TRANSITION OVERLAY
   Login button click → center-ல இருந்து
   expand ஆகி next page-ஐ reveal பண்ணும்
═══════════════════════════════════════ */
#transitionOverlay {
  position: fixed;
  /* Screen center-ல start */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 100vw;
  height: 100vh;
  background: var(--red);
  z-index: 100;
  border-radius: 50%;           /* Circle-ஆ start ஆகும் */
  pointer-events: none;
  transition: none;
}

/* Animation trigger ஆகும்போது */
#transitionOverlay.expanding {
  transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1),
              border-radius 0.7s ease;
  transform: translate(-50%, -50%) scale(3);  /* Full screen cover */
  border-radius: 0%;
}

#transitionOverlay.expanded {
  transform: translate(-50%, -50%) scale(3);
  border-radius: 0%;
}

/* ─── DASHBOARD PAGE ─── */
#dashboardPage {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: #080808;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease 0.5s;
}

#dashboardPage.visible {
  opacity: 1;
  pointer-events: all;
}

/* Dashboard content */
.dash-welcome {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  color: var(--red);
  letter-spacing: 6px;
  margin-bottom: 16px;
  opacity: 0;
  animation: none;
}
.dash-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 6vw, 80px);
  color: white;
  letter-spacing: 4px;
  line-height: 1;
  text-align: center;
  opacity: 0;
}
.dash-title span { color: var(--red); }

.dash-cards {
  display: flex;
  gap: 20px;
  margin-top: 48px;
  opacity: 0;
}
.dash-card {
  background: #111;
  border: 1px solid #1e1e1e;
  border-top: 3px solid var(--red);
  padding: 24px 32px;
  border-radius: 2px;
  text-align: center;
  min-width: 160px;
}
.dash-card-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--red); }
.dash-card-label { font-size: 10px; color: #444; letter-spacing: 2px; font-weight: 700; margin-top: 4px; text-transform: uppercase; }

.dash-back {
  margin-top: 40px;
  background: transparent;
  border: 1px solid #2a2a2a;
  color: #555;
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  padding: 10px 24px;
  border-radius: 2px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  opacity: 0;
  letter-spacing: 1px;
}
.dash-back:hover { border-color: var(--red); color: var(--red); }

/* Dashboard grid bg */
.dash-grid {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(232,0,13,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,0,13,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* ─── KEYFRAMES ─── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes gridMove { from { background-position: 0 0; } to { background-position: 60px 60px; } }
@keyframes floatIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes floatBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes pulse { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

/* Dash content animations */
@keyframes dashFadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- ═══ TRANSITION OVERLAY (Red circle expand) ═══ -->
<div id="transitionOverlay"></div>

<!-- ═══ DASHBOARD PAGE ═══ -->
<div id="dashboardPage">
  <div class="dash-grid"></div>
  <div class="dash-welcome" id="dashWelcome">WELCOME BACK</div>
  <div class="dash-title" id="dashTitle">YOUR FITNESS<br/><span>DASHBOARD</span></div>
  <div class="dash-cards" id="dashCards">
    <div class="dash-card">
      <div class="dash-card-value">Day 1</div>
      <div class="dash-card-label">Streak</div>
    </div>
    <div class="dash-card">
      <div class="dash-card-value">0</div>
      <div class="dash-card-label">Calories</div>
    </div>
    <div class="dash-card">
      <div class="dash-card-value">0%</div>
      <div class="dash-card-label">Goal</div>
    </div>
  </div>
  <button class="dash-back" id="dashBack" onclick="goBack()">← Back to Login</button>
</div>

<!-- ═══ LOGIN PAGE ═══ -->
<div id="loginPage">
  <div class="page">

    <!-- LEFT PANEL -->
    <div class="left">
      <div class="left-bg"></div>
      <div class="grid-lines"></div>
      <div class="scanlines"></div>
      <canvas id="particles"></canvas>
      <div class="bg-text">FIT</div>
      <div class="corner-accent"></div>
      <div class="corner-accent-bl"></div>
      <div class="divider-vert"></div>
      
      <div class="hero-content">
        <div class="hero-eyebrow">AI — POWERED FITNESS</div>
        <div class="hero-title">FORGE<br/>YOUR<br/><span>LIMITS</span></div>
        <div class="hero-sub">PERSONALIZED · INTELLIGENT · RELENTLESS</div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
      <div class="top-line"></div>
      <div class="brand">
        <div class="brand-logo">
          <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
            <rect x="2" y="15" width="6" height="6" rx="1" fill="#E8000D"/>
            <rect x="28" y="15" width="6" height="6" rx="1" fill="#E8000D"/>
            <rect x="7" y="11" width="4" height="14" rx="1" fill="#E8000D"/>
            <rect x="25" y="11" width="4" height="14" rx="1" fill="#E8000D"/>
            <rect x="11" y="16" width="14" height="4" rx="1" fill="white"/>
          </svg>
        </div>
        <div class="brand-name">FIT<em>AI</em></div>
      </div>
      <div class="form-heading"><h2>WELCOME <span>BACK</span></h2></div>
      <p class="form-sub">Sign in to continue your journey</p>

      <div class="field">
        <label class="field-label">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input type="email" id="email" placeholder="you@fitai.com" autocomplete="email"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
          <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password"/>
          <button class="toggle-pw" onclick="togglePw()" type="button">
            <svg id="eyeOpen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeClosed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="options-row">
        <label class="check-label" onclick="toggleCheck()">
          <div class="custom-check" id="checkBox"></div>
          <span class="check-text">Remember me</span>
        </label>
        <a href="#" class="forgot-link">FORGOT PASSWORD?</a>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleLogin()">
        <span id="btnText">ENTER </span>
        <svg id="btnArrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
        <div class="dots" id="btnDots" style="display:none"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </button>

      <div class="or-row"><div class="or-line"></div><span class="or-text">OR</span><div class="or-line"></div></div>

      <button class="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.9 6.5 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.9 6.5 29.2 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.8-1.9 13.4-5l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3-11.3-7.2l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C40.8 35.3 44 30 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
        Continue with Google
      </button>

      <div class="register-row">New to FitAI? <a href="#">CREATE ACCOUNT →</a></div>
      <div class="bottom-tag">© 2026 FitAI Platform</div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
